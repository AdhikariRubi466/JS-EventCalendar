<!DOCTYPE html>
<html>
<head>
    <title>Find Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="show">
        <h2>Find Day of Any Date</h2>

        <input type="number" id="dayInput" placeholder="Enter Day (1-31)" min="1" max="31" required>

        <select id="monthInput">
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
        </select>

        <input type="number" id="yearInput" placeholder="Enter Year (e.g., 2023)" min="1000" max="9999" required>

        <button id="findBtn">Find</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
